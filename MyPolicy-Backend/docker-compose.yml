services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - mypolicy-net
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  config-service:
    build:
      context: ./config-service
      dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "8889:8888"
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile
    container_name: customer-service
    ports:
      - "8081:8081"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/Backend_databases
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  policy-service:
    build:
      context: ./policy-service
      dockerfile: Dockerfile
    container_name: policy-service
    ports:
      - "8085:8085"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/Backend_databases
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  data-pipeline-service:
    build:
      context: ./data-pipeline-service
      dockerfile: Dockerfile
    container_name: data-pipeline-service
    ports:
      - "8082:8082"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/Backend_databases
      MONGODB_URI: mongodb://mongodb:27017/Backend_databases
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  bff-service:
    build:
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: bff-service
    ports:
      - "8090:8090"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      policy-service:
        condition: service_healthy
      data-pipeline-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      bff-service:
        condition: service_healthy
    networks:
      - mypolicy-net

networks:
  mypolicy-net:
    driver: bridge
volumes:
  mongo_data:

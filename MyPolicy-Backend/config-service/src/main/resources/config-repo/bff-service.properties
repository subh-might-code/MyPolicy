# ============================================
# BFF Service Configuration (from Config Server)
# ============================================

server.port=8090
spring.application.name=bff-service

# ============================================
# Feign Configuration
# ============================================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=BASIC

# ============================================
# Logging
# ============================================
logging.level.com.mypolicy.bff=DEBUG
logging.level.feign=DEBUG

# ============================================
# Security
# ============================================
# JWT configuration (if needed)
# jwt.secret=your-secret-key-from-config-server
# jwt.expiration=86400000

# ============================================
# Actuator
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================
# Eureka Discovery
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

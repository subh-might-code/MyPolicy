# ============================================
# Policy Service Configuration (from Config Server)
# ============================================

server:
  port: 8085

spring:
  application:
    name: policy-service

  # ============================================
  # MongoDB Database Configuration
  # ============================================
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://praticks2003_db_user:cPZqSJF3LPPsHSEv@cluster0.enwyvnr.mongodb.net/mypolicy?retryWrites=true&w=majority}
      database: mypolicy

# ============================================
# Logging
# ============================================
logging:
  level:
    com.mypolicy.policy: INFO

# ============================================
# Actuator
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

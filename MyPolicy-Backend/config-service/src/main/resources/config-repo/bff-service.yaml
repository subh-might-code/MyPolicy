# ============================================
# BFF Service Configuration (from Config Server)
# ============================================

server:
  port: 8090

spring:
  application:
    name: bff-service

# ============================================
# Feign Configuration
# ============================================
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: BASIC
      # Direct URLs when Eureka has no instances (development fallback)
      customer-service:
        url: http://localhost:8081
      data-pipeline-service:
        url: http://localhost:8082
      policy-service:
        url: http://localhost:8085

# ============================================
# Security
# ============================================
# JWT configuration (if needed)
# jwt:
#   secret: your-secret-key-from-config-server
#   expiration: 86400000

# ============================================
# Logging
# ============================================
logging:
  level:
    com.mypolicy.bff: DEBUG
    feign: DEBUG

# ============================================
# Actuator
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

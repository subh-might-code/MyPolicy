# ============================================
# Data-Pipeline Service Configuration (from Config Server)
# Consolidated: Ingestion + Metadata + Processing + Matching
# ============================================

server:
  port: 8082

spring:
  application:
    name: data-pipeline-service

  # ============================================
  # MongoDB Configuration
  # ============================================
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://praticks2003_db_user:cPZqSJF3LPPsHSEv@cluster0.enwyvnr.mongodb.net/Backend_databases?retryWrites=true&w=majority}
      database: Backend_databases
      auto-index-creation: true

# ============================================
# Module-Specific Settings
# ============================================
ingestion:
  storage:
    path: storage/ingestion
  max-file-size: 52428800
  allowed-extensions: .xls,.xlsx,.csv

metadata:
  cache:
    ttl: 3600
    max-size: 1000

processing:
  thread-pool-size: 10
  batch-size: 100

matching:
  fuzzy-threshold: 3
  similarity-algorithm: LEVENSHTEIN

# ============================================
# Feign Configuration
# ============================================
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# ============================================
# Logging
# ============================================
logging:
  level:
    com.mypolicy.pipeline: INFO
    com.mypolicy.implementation: INFO

# ============================================
# Actuator
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

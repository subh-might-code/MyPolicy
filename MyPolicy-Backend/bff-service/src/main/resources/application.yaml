server:
  port: 8090

spring:
  config:
    import: optional:configserver:http://admin:config123@localhost:8888
  application:
    name: bff-service

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# Logging
logging:
  level:
    com.mypolicy.bff: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

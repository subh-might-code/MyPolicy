# Standalone Data Pipeline Service for QA/API testing
# Run: docker compose up -d
# Test: http://localhost:8081/api/pipeline/run  |  http://localhost:8081/insurer-portal

services:
  mongodb:
    image: mongo:7-jammy
    container_name: pipeline-mongodb
    ports:
      - "27017:27017"
    volumes:
      - pipeline_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-pipeline-service:
    build: .
    container_name: pipeline-service
    ports:
      - "8081:8081"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/Backend_databases
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure

volumes:
  pipeline_mongo_data:
